<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography — Pradyota Phaneesh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent:  #0050D8;
      --bg:      #0e0e0e;
      --nav-h:   60px;
      --gap:     10px;
      --f-body:  'Outfit', sans-serif;
      --f-disp:  'Cormorant Garamond', serif;
      --f-mono:  'JetBrains Mono', monospace;
      --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: rgba(255,255,255,0.8);
      font-family: var(--f-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ════ NAV ════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 400;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(14,14,14,0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .nav-logo {
      font-family: var(--f-body); font-weight: 700; font-size: 0.8rem;
      color: #fff; background: var(--accent);
      width: 34px; height: 34px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: background 0.2s; flex-shrink: 0;
    }
    .nav-logo:hover { background: #003db0; }
    .nav-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-family: var(--f-disp); font-size: 1rem; font-style: italic;
      color: rgba(255,255,255,0.4); letter-spacing: 0.04em; pointer-events: none;
    }
    .nav-back {
      font-family: var(--f-body); font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.2s;
    }
    .nav-back:hover { color: rgba(255,255,255,0.85); }
    .nav-back::before { content: '← '; }

    /* ════ PAGE ════ */
    .page {
      padding-top: calc(var(--nav-h) + 3.5rem);
      padding-bottom: 5rem;
      max-width: 1440px;
      margin: 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
    }

    .gallery-header {
      margin-bottom: 2.5rem;
      display: flex; align-items: baseline; gap: 1rem;
    }
    .gallery-header h1 {
      font-family: var(--f-disp);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 400; color: rgba(255,255,255,0.9);
      line-height: 1; letter-spacing: -0.01em;
    }
    .photo-count {
      font-family: var(--f-mono); font-size: 0.62rem;
      color: rgba(255,255,255,0.2); letter-spacing: 0.12em;
      text-transform: uppercase; align-self: flex-end; padding-bottom: 0.2rem;
    }

    /* ════ MASONRY GRID ════ */
    .gallery {
      columns: 3;
      column-gap: var(--gap);
    }
    @media (max-width: 900px) { .gallery { columns: 2; } }
    @media (max-width: 480px) { .gallery { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
      border-radius: 2px;
      background: #181818;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
    }
    .gallery-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .gallery-item img {
      display: block;
      width: 100%; height: auto;
      transition: transform 0.55s var(--ease), filter 0.4s;
      will-change: transform;
    }
    .gallery-item:hover img {
      transform: scale(1.03);
      filter: brightness(1.07);
    }
    /* Dark tint on hover */
    .gallery-item::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
      pointer-events: none;
    }
    .gallery-item:hover::after { background: rgba(0,0,0,0.06); }

    /* Expand indicator */
    .item-expand {
      position: absolute; bottom: 10px; right: 10px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.88);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #111;
      opacity: 0; transform: scale(0.6);
      transition: opacity 0.22s, transform 0.22s var(--ease);
      pointer-events: none; z-index: 2;
    }
    .gallery-item:hover .item-expand { opacity: 1; transform: scale(1); }

    /* ════ LIGHTBOX ════ */
    .lb {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      background: #000;
      cursor: zoom-out;
    }
    .lb.open {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: lbIn 0.28s var(--ease) forwards;
    }
    @keyframes lbIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* The image fills as much of the screen as possible */
    .lb-img-wrap {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-img-wrap img {
      max-width: 100vw; max-height: 100vh;
      width: auto; height: auto;
      object-fit: contain;
      display: block;
      cursor: default;
      /* Slight pop-in */
      animation: imgIn 0.32s var(--ease) forwards;
    }
    @keyframes imgIn {
      from { transform: scale(0.97); opacity: 0.6; }
      to   { transform: scale(1);    opacity: 1; }
    }

    /* Chrome — hidden until hover/move, then auto-hides */
    .lb-chrome { opacity: 0; transition: opacity 0.22s; }
    .lb.show-chrome .lb-chrome { opacity: 1; }

    .lb-close {
      position: fixed; top: 1.4rem; right: 1.6rem;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9); font-size: 1.05rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .lb-close:hover { background: rgba(255,255,255,0.22); }

    .lb-arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.85); font-size: 1.6rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.18s;
      z-index: 10;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.18); }
    #lbPrev { left: 1.4rem; }
    #lbNext { right: 1.4rem; }
    #lbPrev:hover { transform: translateY(-50%) translateX(-2px); }
    #lbNext:hover { transform: translateY(-50%) translateX(2px); }

    .lb-counter {
      position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
      font-family: var(--f-mono); font-size: 0.58rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.22); pointer-events: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo" aria-label="Home">PP</a>
    <span class="nav-title">Photography</span>
    <a href="index.html" class="nav-back">Back to Portfolio</a>
  </nav>

  <main class="page">
    <header class="gallery-header">
      <h1>Photography</h1>
      <span class="photo-count" id="photoCount"></span>
    </header>

    <!--
      ════ HOW TO ADD PHOTOS ════
      Add images at Images/photography/photo-1.jpg … photo-13.jpg
      Any aspect ratio works — the masonry grid handles it.
      To add more: copy any .gallery-item block and update the src.
    -->
    <div class="gallery" id="gallery">

      <div class="gallery-item" data-idx="0">
        <img src="Images/photography/photo-1.jpg"  alt="Photo 1"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="1">
        <img src="Images/photography/photo-2.jpg"  alt="Photo 2"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="2">
        <img src="Images/photography/photo-3.jpg"  alt="Photo 3"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="3">
        <img src="Images/photography/photo-4.jpg"  alt="Photo 4"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="4">
        <img src="Images/photography/photo-5.jpg"  alt="Photo 5"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="5">
        <img src="Images/photography/photo-6.jpg"  alt="Photo 6"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="6">
        <img src="Images/photography/photo-7.jpg"  alt="Photo 7"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="7">
        <img src="Images/photography/photo-8.jpg"  alt="Photo 8"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="8">
        <img src="Images/photography/photo-9.jpg"  alt="Photo 9"  loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="9">
        <img src="Images/photography/photo-10.jpg" alt="Photo 10" loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="10">
        <img src="Images/photography/photo-11.jpg" alt="Photo 11" loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="11">
        <img src="Images/photography/photo-12.jpg" alt="Photo 12" loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>
      <div class="gallery-item" data-idx="12">
        <img src="Images/photography/photo-13.jpg" alt="Photo 13" loading="lazy" />
        <span class="item-expand">⤢</span>
      </div>

    </div>
  </main>

  <!-- FULLSCREEN LIGHTBOX -->
  <div class="lb" id="lb" role="dialog" aria-modal="true">
    <button class="lb-chrome lb-close" id="lbClose" aria-label="Close">✕</button>
    <button class="lb-chrome lb-arrow" id="lbPrev" aria-label="Previous photo">‹</button>
    <div class="lb-img-wrap" id="lbWrap">
      <img src="" alt="" id="lbImg" />
    </div>
    <button class="lb-chrome lb-arrow" id="lbNext" aria-label="Next photo">›</button>
    <p class="lb-chrome lb-counter" id="lbCounter"></p>
  </div>

  <script>
    /* ──────────────────────────────────────────
       Build the list of successfully-loaded items
    ────────────────────────────────────────── */
    var allItems = Array.from(document.querySelectorAll('.gallery-item'));
    var loaded   = []; // items with real images
    var chromeTimer;

    allItems.forEach(function(item, i) {
      var img = item.querySelector('img');
      if (!img) { item.style.display = 'none'; return; }

      function onLoad() {
        if (!loaded.includes(item)) loaded.push(item);
        // Stagger the fade-in slightly
        setTimeout(function() { item.classList.add('visible'); }, loaded.length * 40);
        updateCount();
      }

      img.addEventListener('load',  onLoad);
      img.addEventListener('error', function() { item.style.display = 'none'; });

      // Already cached
      if (img.complete && img.naturalWidth > 0) onLoad();
    });

    function updateCount() {
      var el = document.getElementById('photoCount');
      if (el && loaded.length > 0) {
        el.textContent = loaded.length + (loaded.length === 1 ? ' photo' : ' photos');
      }
    }

    /* ──────────────────────────────────────────
       Lightbox
    ────────────────────────────────────────── */
    var lb      = document.getElementById('lb');
    var lbImg   = document.getElementById('lbImg');
    var lbWrap  = document.getElementById('lbWrap');
    var lbCtr   = document.getElementById('lbCounter');
    var lbClose = document.getElementById('lbClose');
    var lbPrev  = document.getElementById('lbPrev');
    var lbNext  = document.getElementById('lbNext');
    var current = 0;

    function openAt(idx) {
      if (idx < 0 || idx >= loaded.length) return;
      current = idx;
      var img = loaded[idx].querySelector('img');
      lbImg.src = img.src;
      lbImg.alt = img.alt || '';
      if (lbCtr) lbCtr.textContent = (idx + 1) + ' / ' + loaded.length;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      flashChrome();
    }

    function closeLb() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      clearTimeout(chromeTimer);
      setTimeout(function() { lbImg.src = ''; }, 300);
    }

    function prev() { openAt((current - 1 + loaded.length) % loaded.length); }
    function next() { openAt((current + 1) % loaded.length); }

    function flashChrome() {
      lb.classList.add('show-chrome');
      clearTimeout(chromeTimer);
      chromeTimer = setTimeout(function() {
        lb.classList.remove('show-chrome');
      }, 2500);
    }

    // Click gallery items
    allItems.forEach(function(item) {
      item.addEventListener('click', function() {
        var idx = loaded.indexOf(item);
        if (idx !== -1) openAt(idx);
      });
    });

    // Lightbox controls
    lbClose.addEventListener('click', closeLb);
    lbPrev.addEventListener('click',  prev);
    lbNext.addEventListener('click',  next);

    // Click the background or image (not buttons) to close
    lb.addEventListener('click', function(e) {
      if (e.target === lb || e.target === lbWrap || e.target === lbImg) closeLb();
    });

    // Show chrome on mouse movement inside lb
    lb.addEventListener('mousemove', flashChrome);

    // Keyboard
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    prev();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  next();
      if (e.key === 'Escape')                               closeLb();
    });
  </script>
</body>
</html>
